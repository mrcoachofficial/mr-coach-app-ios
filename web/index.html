<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="google-signin-client_id" content="91035596332-akkmai05bpof4jjaau3tg126seba4ip4.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mrcoach">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>MR.Coach</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Razorpay Checkout Script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    window.openRazorpay = function(optionsStr, onSuccess, onFailure) {
      try {
        var rzpOptions = JSON.parse(optionsStr);
        rzpOptions.handler = function(response) {
          onSuccess(
            response.razorpay_payment_id || '',
            response.razorpay_order_id || '',
            response.razorpay_signature || ''
          );
        };
        rzpOptions.modal = {
          ondismiss: function() {
            onFailure("Payment dismissed by user");
          }
        };
        var rzp = new Razorpay(rzpOptions);
        rzp.open();
      } catch (e) {
        onFailure(e.toString());
      }
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
