# Codemagic configuration for MrCoach iOS
workflows:
  ios-release:
    name: MrCoach iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      vars:
        XCODE_PROJECT: "ios/Runner.xcodeproj"
        XCODE_SCHEME: "Runner"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
    scripts:
      - name: Set up keychain
        script: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(python3 -c "import base64, os; val = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '').strip(); print(base64.b64decode(val).decode('utf-8') if not val.startswith('---') else val)")
          export CERTIFICATE_PRIVATE_KEY=$(python3 -c "import base64, os; val = os.environ.get('CERTIFICATE_PRIVATE_KEY', '').strip(); print(base64.b64decode(val).decode('utf-8') if not val.startswith('---') else val)")
          keychain initialize
      - name: Fetch signing files
        script: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(python3 -c "import base64, os; val = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '').strip(); print(base64.b64decode(val).decode('utf-8') if not val.startswith('---') else val)")
          export CERTIFICATE_PRIVATE_KEY=$(python3 -c "import base64, os; val = os.environ.get('CERTIFICATE_PRIVATE_KEY', '').strip(); print(base64.b64decode(val).decode('utf-8') if not val.startswith('---') else val)")
          app-store-connect fetch-signing-files "com.mrcoachclient.app" --type IOS_APP_STORE --create
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Build Flutter iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
      - name: Publish to App Store Connect
        script: |
          export APP_STORE_CONNECT_PRIVATE_KEY=$(python3 -c "import base64, os; val = os.environ.get('APP_STORE_CONNECT_PRIVATE_KEY', '').strip(); print(base64.b64decode(val).decode('utf-8') if not val.startswith('---') else val)")
          app-store-connect publish
    artifacts:
      - build/ios/ipa/*.ipa
